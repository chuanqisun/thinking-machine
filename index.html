<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000000 url("./src/assets/base.webp") no-repeat center center;
        background-size: contain;
        font-family: monospace;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        display: block;
        outline: none;
        touch-action: none;
      }
      #lightmap {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        mix-blend-mode: multiply;
        display: none;
      }
      #overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 15, 15, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: opacity 0.4s ease;
      }
      #start-btn {
        background: #222;
        color: #fff;
        border: 2px solid #444;
        padding: 16px 32px;
        font-size: 32px;
        font-family: monospace;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 3px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        border-radius: 6px;
        transition: all 0.2s ease;
      }
      #start-btn:hover {
        background: #333;
        border-color: #f0f0f0;
      }
      #start-btn:active {
        transform: scale(0.95);
      }

      #menu-container {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 290px;
        background: rgba(20, 20, 20, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        color: #e0e0e0;
        font-family: monospace;
        font-size: 13px;
        z-index: 10;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: max-height 0.3s ease;
        max-height: 95vh;
      }
      #menu-container.collapsed {
        max-height: 38px;
      }
      #menu-header {
        background: rgba(30, 30, 30, 0.9);
        padding: 10px 14px;
        font-weight: bold;
        letter-spacing: 1.5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        cursor: pointer;
      }
      #menu-header:hover {
        background: rgba(40, 40, 40, 0.9);
      }
      #menu-content {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
      }
      .menu-section-title {
        font-weight: bold;
        color: #fff;
        margin-bottom: 4px;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }
      .preset-btn {
        background: #2a2a2a;
        color: #e0e0e0;
        border: 1px solid #444;
        padding: 8px;
        font-family: monospace;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px;
        text-align: center;
        transition: all 0.15s ease;
      }
      .preset-btn:hover {
        background: #3a3a3a;
        border-color: #fff;
        color: #fff;
      }
      .preset-btn:active {
        transform: scale(0.97);
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row .preset-btn {
        flex: 1;
      }
      .param-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .param-row label {
        font-size: 11px;
        color: #bbb;
      }
      .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .slider-row input[type="range"] {
        flex: 1;
        min-width: 0;
      }
      .slider-row span {
        width: 40px;
        text-align: right;
        color: #aaa;
        font-size: 11px;
      }

      .handle {
        position: absolute;
        width: 18px;
        height: 18px;
        background: #00ff00;
        border: 2px solid #fff;
        border-radius: 50%;
        cursor: move;
        transform: translate(-50%, -50%);
        z-index: 150;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: monospace;
        font-size: 11px;
        color: black;
        font-weight: bold;
        transition:
          transform 0.1s ease,
          opacity 0.15s ease;
        pointer-events: auto;
      }
      .handle:hover {
        background: #66ff66;
        transform: translate(-50%, -50%) scale(1.25);
      }
      .handle.active {
        background: #ff3333;
        color: white;
        opacity: 0;
      }
      #calibration-banner {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 15, 15, 0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid #00ff00;
        border-radius: 6px;
        padding: 10px 20px;
        color: #fff;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        z-index: 100;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        text-align: center;
        pointer-events: none;
        display: none;
      }
      #calibration-banner .highlight {
        color: #00ff00;
      }
    </style>
  </head>
  <body>
    <canvas id="lightmap"></canvas>

    <div id="overlay"><button id="start-btn">Start</button></div>

    <div id="calibration-banner">CALIBRATION MODE: <span id="calibration-msg" class="highlight">Click Top-Left Corner</span></div>

    <svg id="calibration-svg" style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 140; display: none">
      <polygon id="calibration-poly" points="" style="fill: rgba(0, 255, 0, 0.1); stroke: #00ff00; stroke-width: 2; stroke-dasharray: 4" />
    </svg>

    <div id="calibration-handles" style="position: absolute; inset: 0; pointer-events: none; z-index: 150">
      <div class="handle" id="handle-0" style="display: none" data-idx="0">1</div>
      <div class="handle" id="handle-1" style="display: none" data-idx="1">2</div>
      <div class="handle" id="handle-2" style="display: none" data-idx="2">3</div>
      <div class="handle" id="handle-3" style="display: none" data-idx="3">4</div>
    </div>

    <input type="file" id="import-file" accept="application/json,.json" style="display: none" />

    <div id="menu-container">
      <div id="menu-header"><span>CONTROLS</span><span id="collapse-icon">[-]</span></div>
      <div id="menu-content">
        <div class="menu-section-title">Projection Mapping</div>
        <button class="preset-btn" id="btn-calibrate-start" style="background: #005500; color: #00ff00; border-color: #008800; font-weight: bold">
          Start 4-Corner Calibration
        </button>
        <button class="preset-btn" id="btn-adjust-corners">Adjust Corners</button>
        <div class="row">
          <button class="preset-btn" id="btn-calibrate-reset">Reset</button>
          <button class="preset-btn" id="btn-calibrate-done" style="display: none; background: #550000; border-color: #880000; color: #ff9999">Done</button>
        </div>

        <div class="menu-section-title" style="margin-top: 6px">Lighting Blend</div>
        <div id="blend-controls" style="display: flex; flex-direction: column; gap: 8px"></div>
        <button class="preset-btn" id="btn-blend-reset">Reset Blend</button>

        <div class="menu-section-title" style="margin-top: 6px">Settings File</div>
        <div class="row">
          <button class="preset-btn" id="btn-export">Export JSON</button>
          <button class="preset-btn" id="btn-import">Import JSON</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
